<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NekoFlix Finder</title>
  <link rel="stylesheet" href="./src/styles.css">
</head>
<body>
  <main class="shell">
    <header>
      <p class="eyebrow">NekoFlix Finder</p>
      <h1>Find books without summoning a generic tutorial UI.</h1>
    </header>
    <form id="searchForm" class="search-panel">
      <input id="queryInput" placeholder="Search books, authors, ideas..." required>
      <select id="filterSelect" aria-label="Filter books">
        <option value="all">All results</option>
        <option value="ebooks">Has ebook access</option>
        <option value="covers">Has cover</option>
      </select>
      <button type="submit">Search</button>
    </form>
    <p id="status" class="status"></p>
    <section id="results" class="grid" aria-live="polite"></section>
    <nav class="pager" aria-label="Pagination">
      <button id="prevPage">Previous</button>
      <span id="pageLabel">Page 1</span>
      <button id="nextPage">Next</button>
    </nav>
  </main>
          <script src="./src/browser.js"></script>
</body>
</html>
